<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>運動会スコア</title>
<style>
body { font-family: sans-serif; text-align: center; }
button { font-size: 20px; margin: 5px; padding: 10px; }
.score { font-size: 28px; margin: 10px; }

.redBtn { background-color: #ff4d4d; color: white; }
.whiteBtn { background-color: #f0f0f0; color: black; border: 1px solid #999; }

.selected { outline: 3px solid blue; }

/* テーブル */
table { margin: 20px auto; border-collapse: collapse; width: 90%; max-width: 500px; }
th, td { border: 1px solid #aaa; padding: 8px; }
th { background-color: #ddd; }
tr:hover { background-color: #f5f5f5; cursor: pointer; }
.redCell { background-color: #ffcccc; }
.whiteCell { background-color: #ffffff; }
</style>
</head>
<body>

<h2>徒競走スコア</h2>

<div class="score">赤: <span id="red">0</span> 点</div>
<div class="score">白: <span id="white">0</span> 点</div>

<h3>順位入力</h3>
<div id="inputs"></div>

<br>
<button onclick="confirmRace()">このレース確定</button>
<button onclick="undo()">1つ戻す</button>

<h3>順位ログ</h3>
<table id="raceTable">
  <tr>
    <th>レース</th>
    <th>1位</th>
    <th>2位</th>
    <th>3位</th>
    <th>4位</th>
  </tr>
</table>

<h3>得点ログ</h3>
<table id="scoreTable">
  <tr>
    <th>レース</th>
    <th>赤</th>
    <th>白</th>
  </tr>
</table>

<script>
let red = 0;
let white = 0;
let history = [];
let raceCount = 0;

const points = [4,3,2,1];

function createInputs(){
  let html = "";
  for(let i=0;i<4;i++){
    html += `<div>
      ${i+1}位:
      <button class="redBtn" onclick="setPos(${i},'red')">赤</button>
      <button class="whiteBtn" onclick="setPos(${i},'white')">白</button>
    </div>`;
  }
  document.getElementById("inputs").innerHTML = html;
}

let current = [null,null,null,null];

function setPos(pos, team){
  current[pos] = team;
  const row = document.getElementById("inputs").children[pos];
  const buttons = row.querySelectorAll("button");
  buttons.forEach(btn => btn.classList.remove("selected"));
  if(team === 'red') buttons[0].classList.add("selected");
  else buttons[1].classList.add("selected");
}

function confirmRace(){

  // ★ 未入力があってもOK（3人だけでも確定できる）
  let r = 0;
  let w = 0;

  for (let i = 0; i < 4; i++) {
    if (current[i] === 'red') r += points[i];
    else if (current[i] === 'white') w += points[i];
  }

  red += r;
  white += w;
  history.push([r, w, current.slice()]);
  raceCount++;

  addRaceRow(raceCount, current);
  addScoreRow(raceCount, r, w);

  update();
  current = [null,null,null,null];
  createInputs();
}

function addRaceRow(num, arr){
  const table = document.getElementById("raceTable");
  const row = table.insertRow(-1);

  row.onclick = () => deleteRace(num, row);

  row.insertCell(0).innerText = num;
  for(let i=0;i<4;i++){
    const cell = row.insertCell(-1);
    if (arr[i] === 'red') {
      cell.innerText = '赤';
      cell.className = 'redCell';
    } else if (arr[i] === 'white') {
      cell.innerText = '白';
      cell.className = 'whiteCell';
    } else {
      cell.innerText = '-';  // ★ 未入力は "-" 表示
    }
  }
}

function addScoreRow(num, r, w){
  const table = document.getElementById("scoreTable");
  const row = table.insertRow(-1);

  row.onclick = () => deleteRace(num, row);

  row.insertCell(0).innerText = num;
  row.insertCell(1).innerText = r;
  row.insertCell(2).innerText = w;
}

function deleteRace(num, row){
  if(!confirm(num + "レース目を削除しますか？")) return;

  const index = num - 1;
  const [r, w] = history[index];

  red -= r;
  white -= w;

  history[index] = [0,0,["-","-","-","-"]];

  update();

  row.style.textDecoration = "line-through";
  row.style.opacity = "0.5";
}

function undo(){
  if(history.length === 0) return;

  let last = history.pop();
  let r = last[0];
  let w = last[1];

  red -= r;
  white -= w;

  let raceTable = document.getElementById("raceTable");
  if (raceTable.rows.length > 1) {
    raceTable.deleteRow(-1);
  }

  let scoreTable = document.getElementById("scoreTable");
  if (scoreTable.rows.length > 1) {
    scoreTable.deleteRow(-1);
  }

  raceCount--;

  update();
}

function update(){
  document.getElementById("red").innerText = red;
  document.getElementById("white").innerText = white;
}

createInputs();
</script>

</body>
</html>
